version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sgai
      POSTGRES_USER: sgai
      POSTGRES_PASSWORD: sgai_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U sgai"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://sgai:sgai_secret@postgres:5432/sgai
    ports: ["8000:8000"]
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    image: devopsfaith/krakend:2.6
    volumes:
      - ./gateway/krakend.json:/etc/krakend/krakend.json:ro
    ports: ["8080:8080"]
    depends_on: [backend]

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on: [gateway]

volumes:
  pgdata:
