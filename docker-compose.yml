services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sgai
      POSTGRES_USER: sgai
      POSTGRES_PASSWORD: sgai_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks: [backend_bridge]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U sgai"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://sgai:sgai_secret@postgres:5432/sgai
    volumes:
      - ./backend/static:/app/static
    networks: [backend_bridge]
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    image: devopsfaith/krakend:2.6
    volumes:
      - ./gateway/krakend.json:/etc/krakend/krakend.json:ro
    ports: ["80:8080"]
    networks: [backend_bridge]
    depends_on: [backend]

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports: ["3000:3000"]
    networks: [backend_bridge]
    depends_on: [gateway]

networks:
  backend_bridge:
    driver: bridge

volumes:
  pgdata:

