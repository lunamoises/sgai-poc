server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }
    location /v1/ { proxy_pass http://gateway:8080; }
    location /download/ {
        proxy_pass         http://backend:8000;
        proxy_read_timeout 120s;
        proxy_buffering    off;
    }
}
